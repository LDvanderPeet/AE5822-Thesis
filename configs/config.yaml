seed: 42  # Global random seed for reproducibility across dataloading and model init.

data:
  root_dir: "/shared/home/lvanderpeet/AE5822-Thesis/dataset_patches_128"
  image_height: 128
  image_width: 128
  global_max: 2.5
  subaperture_config:
   input_indices: [1, 3]
   output_indices: [0]
   active_polarizations: ["VV"] # retrieves only these polarizations ("vv", "vh", "hv", "hh")
  loader:
    batch_size: 4  # Number of samples per optimization step.
    num_workers: 8  # Number of worker processes used by PyTorch DataLoader.
    pin_memory: false  # Pin CPU memory for faster transfer to GPU (usually true when training on CUDA).
  split:
    train: 0.7
    valid: 0.2
    test: 0.1

model:
  in_channels: 2  # Channels in the conditional input x.
  out_channels: 1  # Channels in the reconstruction target y.
  num_timesteps: 1000  # Number of diffusion denoising steps.
  schedule: cosine  # Beta schedule variant for the forward process.
  loss_fn: mae # 'mse' for classic DDPM loss, 'hybrid' to blend L2 (high t) with MS-SSIM (low t)
  noise_offset: 0.1 # optional low-frequency offset term to training noise
  ema:
    enabled: true  # Keep an exponential moving average copy of training weights.
    beta: 0.9999  # EMA decay. Closer to 1.0 means smoother but slower-reacting EMA weights.
    update_every: 1  # Apply EMA update every N train batches.
    update_after_step: 100  # Start EMA smoothing after this many updates; before that copy weights directly.
  unet:
    dim: 48  # Base UNet width. Previous setting was 64; 48 reduces parameter count to about half (30M instead of 55M).
    dim_mults: [1, 2, 4, 8]  # Width multipliers per UNet level.
    channels: 3  # Input channels to UNet; for conditional concat this is usually in_channels + out_channels.
    out_dim: 1  # UNet output channels; should match model.out_channels.

optimization:
  lr: 0.0005  # AdamW learning rate.
  reduce_lr_on_plateau:
    factor: 0.5  # Multiplicative LR drop factor when metric plateaus.
    patience: 10  # Number of bad validation epochs before LR is reduced.

trainer:
  max_epochs: 100  # Total number of training epochs.
  accelerator: auto  # Lightning accelerator selection: auto/cpu/gpu/mps.
  devices: 1  # Number of devices to use (e.g. 1 for single GPU/CPU process).
  precision: 16  # Numeric precision used by Lightning.
  log_every_n_steps: 10  # Logging frequency in training steps.
  enable_checkpointing: false  # Disable Lightning checkpoint callback by default.
  limit_val_batches: 0.8  # Validation coverage per epoch. Float in [0,1] or int number of batches.

logging:
  wandb:
    project: dif_img_rec  # Weights & Biases project name.
    name: final_data_mae_5e-4  # Optional run name; null lets W&B auto-generate one.
    save_dir: logs  # Local directory used by W&B for run files.
    log_model: false  # Whether to upload model artifacts automatically.
  mode: train
