seed: 27  # Global random seed for reproducibility across dataloading and model init.

data:
  root_dir: "/shared/home/lvanderpeet/AE5822-Thesis/dataset_patches_128"
  image_height: 128
  image_width: 128
  global_max: 300
  subaperture_config:
   input_indices: [1, 3]
   output_indices: [0]
   active_polarizations: ["VV"] # retrieves only these polarizations ("vv", "vh", "hv", "hh")
  loader:
    batch_size: 4  # Number of samples per optimization step.
    num_workers: 8  # Number of worker processes used by PyTorch DataLoader.
    pin_memory: false  # Pin CPU memory for faster transfer to GPU (usually true when training on CUDA).
  split:
    train: 0.7
    valid: 0.2
    test: 0.1

model:
  in_channels: 4  # Channels in the conditional input x.
  out_channels: 2  # Channels in the reconstruction target y.
  num_timesteps: 1000  # Number of diffusion denoising steps.
  schedule: cosine  # Beta schedule variant for the forward process.
  loss_fn: hybrid # 'mse' (L2), 'mae' (L1), or 'hybrid' (MS-SSIM for low t and L1/L2 otherwise).
  hybrid_base_loss: mse # Only used when loss_fn='hybrid': choose fallback loss at high t ('mse' or 'mae').
  hybrid_ms_ssim_t_limit: 10 # Only used when loss_fn='hybrid': apply MS-SSIM for timesteps t <= this limit.
  noise_offset: 0.0 # optional low-frequency offset term to training noise
  ema:
    enabled: false  # Keep an exponential moving average copy of training weights.
    beta: 0.9999  # EMA decay. Closer to 1.0 means smoother but slower-reacting EMA weights.
    update_every: 1  # Apply EMA update every N train batches.
    update_after_step: 10000  # Start EMA smoothing after this many updates; before that copy weights directly.
  unet:
    dim: 48  # Base UNet width. Previous setting was 64; 48 reduces parameter count to about half (30M instead of 55M).
    dim_mults: [1, 2, 4, 8]  # Width multipliers per UNet level.
    channels: 6  # Input channels to UNet; for conditional concat this is usually in_channels + out_channels.
    out_dim: 2  # UNet output channels; should match model.out_channels.

optimization:
  lr: 0.0001  # AdamW learning rate.
  reduce_lr_on_plateau:
    factor: 0.5  # Multiplicative LR drop factor when metric plateaus.
    patience: 10  # Number of bad validation epochs before LR is reduced.

trainer:
  max_epochs: 100  # Total number of training epochs.
  accelerator: auto  # Lightning accelerator selection: auto/cpu/gpu/mps.
  devices: 1  # Number of devices to use (e.g. 1 for single GPU/CPU process).
  precision: 32  # Numeric precision used by Lightning.
  gradient_clip_val: 1.0 # Clip gradients each step to reduce exploding updates (use 0 to disable).
  gradient_clip_algorithm: norm # "norm" (global L2 norm) or "value" (use 0 to disable).
  log_every_n_steps: 10  # Logging frequency in training steps.
  enable_checkpointing: true  # Disable Lightning checkpoint callback by default.
  limit_val_batches: 0.8  # Validation coverage per epoch. Float in [0,1] or int number of batches.
  checkpointing:
    dirpath: checkpoints  # Output directory for saved checkpoints.
    filename: "full-data-{epoch:03d}-{val_loss:.4f}"  # Pattern used for top-k checkpoint names.
    monitor: val_loss  # Metric used to rank checkpoints.
    mode: min  # "min" for losses, "max" for scores.
    save_top_k: 3  # Keep the best N monitored checkpoints.
    save_last: true  # Also keep/update last.ckpt each epoch.
    every_n_epochs: 1  # Save at this epoch interval.
    auto_insert_metric_name: false  # Keep compact names without monitor key prefix.

logging:
  wandb:
    project: dif_img_rec  # Weights & Biases project name.
    name: phase_loss  # Optional run name; null lets W&B auto-generate one.
    save_dir: logs  # Local directory used by W&B for run files.
    log_model: false  # Whether to upload model artifacts automatically.
    save_config_file: true # Upload the active YAML config file to W&B files/artifacts.
    config_artifact_name: null # Optional custom artifact name; null defaults to config-<run_id>.
  mode: train

evaluation:
  checkpoint_path: "/shared/home/lvanderpeet/AE5822-Thesis/checkpoints/Complex-090-0.1085.ckpt"
  save_dir: "evaluation_results"
  tests:
    point_target_analysis: False
    kde_distance: True
    phase_coherence: True