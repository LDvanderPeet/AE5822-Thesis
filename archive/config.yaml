
data:
  root_dir: "/shared/home/lvanderpeet/AE5822-Thesis/data/"

  train:
    tensor_dir: "out_tensors_train_x96"
    csv: "out_tensors_train_x96/train_metadata_x96.csv"
    image_height: 1024
    image_width: 240
    batch_size: 16
    num_workers: 8

  valid:
    tensor_dir: "out_tensors_valid_x96"
    csv: "out_tensors_valid_x96/valid_metadata_x96.csv"

  normalization:
    type: "percentile"
    stats_file: "/shared/home/lvanderpeet/percentiles_sm.npy"

  subaperture_config:
    input_indices: [1,3]
    output_indices: [2]
    active_polarizations: ["vv"]
    is_complex: True

model:
  name: "unet"
  diffusion: True
  in_channels: 4
  out_channels: 2
  base_channels: 128
  depth: 4
  num_steps: 1000

training:
  epochs: 100
  learning_rate: 0.0001
  optimizer: "adamw"
  weight_decay: 0.01
  save_dir: "./experiments/"
  device: "cuda"
  checkpoint_interval: 5
  loss_function: "complex_magnitude"
  loss_params:
      alpha: 0.5
  scheduler:
    patience: 5
    factor: 0.5
    min_lr: 0.000001
  early_stopping:
    patience: 15
    min_delta: 0.00001

save:
  mode: "overfit"
  name: "DiffusionModel"

