
data:
  root_dir: "/shared/home/lvanderpeet/subaps/sbs"

  train:
    tensor_dir: "out_tensors_train_x96"
    csv: "out_tensors_train_x96/train_metadata_x96.csv"

  valid:
    tensor_dir: "out_tensors_valid_x96"
    csv: "out_tensors_valid_x96/valid_metadata_x96.csv"

  normalization:
    type: "percentile"
    stats_file: "/shared/home/lvanderpeet/percentiles_sm.npy"

  subaperture_config:
    input_indices: [1,2]
    target_index: 3

  image_size: 96
  total_sublooks: 3
  input_sublooks: 2
  target_sublooks: 1

  batch_size: 16

  model:
    name: "unet"
    in_channels: 2
    out_channels: 2
    base_channels: 64
    depth: 4

  scheduler:
    beta_schedule: "cosine"
    time_steps: 1000
    prediction_type: "epsilon"

  training:
    epochs: 50
    learning_rate: 0.0002
    optimizer: "adamw"
    weight_decay: 0.01
    save_dir: "./experiments/"
    device: "cuda"


