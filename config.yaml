
data:
  root_dir: "/shared/home/lvanderpeet/subaps/sbs"

  train:
    tensor_dir: "out_tensors_train_x96"
    csv: "out_tensors_train_x96/train_metadata_x96.csv"
    image_size: 96
    batch_size: 128
    num_workers: 8

  valid:
    tensor_dir: "out_tensors_valid_x96"
    csv: "out_tensors_valid_x96/valid_metadata_x96.csv"

  normalization:
    type: "percentile"
    stats_file: "/shared/home/lvanderpeet/percentiles_sm.npy"

  subaperture_config:
    input_indices: [1,3]
    output_indices: [2]
    polarizations: 2
    is_complex: False

model:
  name: "unet"
  in_channels: 4
  out_channels: 2
  base_channels: 64
  depth: 4

training:
  epochs: 50
  learning_rate: 0.0001
  optimizer: "adamw"
  weight_decay: 0.01
  save_dir: "./experiments/"
  device: "cuda"
  checkpoint_interval: 5
  scheduler:
    patience: 1
    factor: 0.5
    min_lr: 1e-5
  early_stopping:
    patience: 10
    min_delta: 0.00001

save:
  name: "CosineAnnealingLR"

